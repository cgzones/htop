os: linux
dist: bionic
language: c


git:
  depth: 3


env:
  global:
   # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
   #   via the "travis encrypt" command using the project repo's public key
  - secure: ""


addons:
  apt:
    packages:
      - libncursesw5-dev
      - libhwloc-dev
      - libnl-3-dev
      - libnl-genl-3-dev
  coverity_scan:
    project:
      name: "cgzones/htop"
      description: "Build submitted via Travis CI"
    notification_email: cgzones@googlemail.com
    build_command_prepend: "./autogen.sh && ./configure --disable-silent-rules --enable-openvz --enable-cgroup --enable-vserver --enable-ancient-vserver --enable-taskstats --enable-unicode --enable-linux-affinity --enable-setuid --enable-delayacct && make clean"
    build_command: "make"
    branch_pattern: coverity_scan


script:
  - cat "${TRAVIS_BUILD_DIR}/cov-int/scm_log.txt"
